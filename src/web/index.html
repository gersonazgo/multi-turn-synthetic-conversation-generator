<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAMI Playground</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100vh;
    display: flex;
    background: #f5f5f5;
    color: #333;
  }

  /* History sidebar */
  #sidebar {
    width: 220px;
    min-width: 220px;
    background: #fff;
    border-right: 1px solid #ddd;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #sidebar h2 {
    font-size: 14px;
    padding: 12px;
    border-bottom: 1px solid #eee;
    color: #666;
  }
  #history-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .history-item {
    padding: 8px 12px;
    cursor: pointer;
    border-bottom: 1px solid #f0f0f0;
    font-size: 12px;
    line-height: 1.4;
  }
  .history-item:hover { background: #f0f7ff; }
  .history-item.active { background: #e3f0ff; }
  .history-item .test-case { font-weight: 600; color: #333; }
  .history-item .meta { color: #888; font-size: 11px; }
  .history-item .result {
    display: inline-block;
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    margin-top: 2px;
  }
  .result-success { background: #d4edda; color: #155724; }
  .result-error { background: #f8d7da; color: #721c24; }
  .result-other { background: #e2e3e5; color: #383d41; }

  /* Conversation panel */
  #conversation-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: #e5ddd5;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5c1.5 0 2.7 1.2 2.7 2.7S31.5 10.4 30 10.4s-2.7-1.2-2.7-2.7S28.5 5 30 5zm15 15c1.5 0 2.7 1.2 2.7 2.7s-1.2 2.7-2.7 2.7-2.7-1.2-2.7-2.7 1.2-2.7 2.7-2.7zm-30 0c1.5 0 2.7 1.2 2.7 2.7s-1.2 2.7-2.7 2.7-2.7-1.2-2.7-2.7 1.2-2.7 2.7-2.7zm15 15c1.5 0 2.7 1.2 2.7 2.7s-1.2 2.7-2.7 2.7-2.7-1.2-2.7-2.7 1.2-2.7 2.7-2.7zm15 15c1.5 0 2.7 1.2 2.7 2.7s-1.2 2.7-2.7 2.7-2.7-1.2-2.7-2.7 1.2-2.7 2.7-2.7zm-30 0c1.5 0 2.7 1.2 2.7 2.7s-1.2 2.7-2.7 2.7-2.7-1.2-2.7-2.7 1.2-2.7 2.7-2.7z' fill='%23d4cdc4' fill-opacity='0.3'/%3E%3C/svg%3E");
  }
  #status-bar {
    padding: 8px 16px;
    background: #075e54;
    color: #fff;
    font-size: 13px;
    min-height: 40px;
    display: flex;
    align-items: center;
  }
  #status-bar .loading-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #25d366;
    margin-right: 8px;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 48px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* WhatsApp-style bubbles */
  .message {
    max-width: 65%;
    padding: 6px 12px 6px 12px;
    border-radius: 8px;
    line-height: 1.45;
    position: relative;
    box-shadow: 0 1px 1px rgba(0,0,0,0.08);
    clear: both;
  }
  .message .speaker {
    font-weight: 600;
    font-size: 12px;
    margin-bottom: 2px;
  }
  .message .content {
    font-size: 14px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  /* Patient bubble — left, white */
  .message.patient {
    background: #fff;
    align-self: flex-start;
    border-top-left-radius: 0;
  }
  .message.patient .speaker { color: #075e54; }
  .message.patient::before {
    content: "";
    position: absolute;
    top: 0;
    left: -8px;
    width: 0; height: 0;
    border-top: 0 solid transparent;
    border-bottom: 10px solid transparent;
    border-right: 8px solid #fff;
  }

  /* Nami bubble — right, green */
  .message.nami {
    background: #dcf8c6;
    align-self: flex-end;
    border-top-right-radius: 0;
  }
  .message.nami .speaker { color: #1e8850; }
  .message.nami::before {
    content: "";
    position: absolute;
    top: 0;
    right: -8px;
    width: 0; height: 0;
    border-top: 0 solid transparent;
    border-bottom: 10px solid transparent;
    border-left: 8px solid #dcf8c6;
  }

  #result-bar {
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 500;
    display: none;
    text-align: center;
  }

  /* Controls panel */
  #controls {
    width: 380px;
    min-width: 380px;
    background: #fff;
    border-left: 1px solid #ddd;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 12px;
    overflow-y: auto;
  }
  #controls label {
    font-size: 12px;
    font-weight: 600;
    color: #555;
    display: block;
    margin-bottom: 4px;
  }
  #controls select {
    width: 100%;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 13px;
    background: #fff;
  }
  .button-row {
    display: flex;
    gap: 8px;
  }
  button {
    padding: 8px 16px;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #btn-play {
    flex: 1;
    background: #1a73e8;
    color: #fff;
  }
  #btn-play:hover:not(:disabled) { background: #1557b0; }
  #btn-stop {
    flex: 1;
    background: #dc3545;
    color: #fff;
  }
  #btn-stop:hover:not(:disabled) { background: #b02a37; }
  #btn-save {
    width: 100%;
    background: #28a745;
    color: #fff;
  }
  #btn-save:hover:not(:disabled) { background: #1e7e34; }

  /* Editor */
  #editor-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  #editor {
    flex: 1;
    width: 100%;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    font-size: 12px;
    line-height: 1.5;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    resize: none;
    min-height: 200px;
    tab-size: 2;
  }
  #save-status {
    font-size: 11px;
    color: #888;
    margin-top: 4px;
    min-height: 16px;
  }
</style>
</head>
<body>

<!-- Sidebar: History -->
<div id="sidebar">
  <h2>Historico</h2>
  <div id="history-list"></div>
</div>

<!-- Conversation Panel -->
<div id="conversation-panel">
  <div id="status-bar">Selecione um prompt e cenario para iniciar.</div>
  <div id="messages"></div>
  <div id="result-bar"></div>
</div>

<!-- Controls -->
<div id="controls">
  <div>
    <label for="select-nami">Prompt da Nami</label>
    <select id="select-nami"><option value="">Carregando...</option></select>
  </div>

  <div>
    <label for="select-scenario">Cenario do Paciente</label>
    <select id="select-scenario"><option value="">Carregando...</option></select>
  </div>

  <div class="button-row">
    <button id="btn-play" disabled>&#9654; Play</button>
    <button id="btn-stop" disabled>&#9632; Stop</button>
  </div>

  <div id="editor-container">
    <label for="editor">Editor do Prompt (Nami)</label>
    <textarea id="editor" placeholder="Selecione um prompt da Nami para editar..." spellcheck="false"></textarea>
    <div id="save-status"></div>
  </div>

  <button id="btn-save" disabled>Salvar Prompt</button>
</div>

<script>
const STOP_LABELS = {
  nami_succeeded: "NAMI teve sucesso",
  turns_ended: "Limite de turnos atingido",
  cancelled: "Cancelada pelo usuario",
  role_swap_error: "Erro: role-swap",
  llm_transient_error: "Erro: transiente (rate limit/timeout)",
  llm_content_error: "Erro: conteudo vazio/recusado",
  llm_non_transient_error: "Erro: falha nao-transiente",
};

let eventSource = null;
let isRunning = false;
let currentNami = "";
let currentPersona = "";

// ── Init ──────────────────────────────────────────────────────────────────

async function init() {
  await Promise.all([loadNamiConfigs(), loadScenarioConfigs(), loadHistory()]);
  document.getElementById("select-nami").addEventListener("change", onNamiSelect);
  document.getElementById("btn-play").addEventListener("click", startConversation);
  document.getElementById("btn-stop").addEventListener("click", stopConversation);
  document.getElementById("btn-save").addEventListener("click", savePrompt);
}

// ── Load configs ──────────────────────────────────────────────────────────

async function loadNamiConfigs() {
  const res = await fetch("/api/configs/nami");
  const configs = await res.json();
  const select = document.getElementById("select-nami");
  select.innerHTML = '<option value="">-- Selecione --</option>';
  configs.forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    select.appendChild(opt);
  });
  updatePlayButton();
}

async function loadScenarioConfigs() {
  const res = await fetch("/api/configs/scenarios");
  const configs = await res.json();
  const select = document.getElementById("select-scenario");
  select.innerHTML = '<option value="">-- Selecione --</option>';
  configs.forEach(cfg => {
    const opt = document.createElement("option");
    opt.value = cfg.name;
    opt.textContent = `${cfg.test_case} — ${cfg.scenario}`;
    select.appendChild(opt);
  });
  select.addEventListener("change", updatePlayButton);
}

// ── Load editor ───────────────────────────────────────────────────────────

async function onNamiSelect() {
  const name = document.getElementById("select-nami").value;
  currentNami = name;
  const editor = document.getElementById("editor");
  const saveStatus = document.getElementById("save-status");
  saveStatus.textContent = "";

  if (!name) {
    editor.value = "";
    document.getElementById("btn-save").disabled = true;
    updatePlayButton();
    return;
  }

  const res = await fetch(`/api/configs/nami/${name}`);
  const data = await res.json();
  editor.value = data.content;
  document.getElementById("btn-save").disabled = false;
  updatePlayButton();
}

// ── Save prompt ───────────────────────────────────────────────────────────

async function savePrompt() {
  if (!currentNami) return;
  const content = document.getElementById("editor").value;
  const saveStatus = document.getElementById("save-status");

  try {
    const res = await fetch(`/api/configs/nami/${currentNami}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content }),
    });
    if (!res.ok) {
      const err = await res.json();
      saveStatus.textContent = `Erro: ${err.detail || "falha ao salvar"}`;
      saveStatus.style.color = "#dc3545";
      return;
    }
    saveStatus.textContent = `Salvo com sucesso. Backup criado.`;
    saveStatus.style.color = "#28a745";
  } catch (e) {
    saveStatus.textContent = `Erro: ${e.message}`;
    saveStatus.style.color = "#dc3545";
  }
}

// ── Conversation ──────────────────────────────────────────────────────────

function updatePlayButton() {
  const nami = document.getElementById("select-nami").value;
  const scenario = document.getElementById("select-scenario").value;
  document.getElementById("btn-play").disabled = !nami || !scenario || isRunning;
}

function startConversation() {
  const nami = document.getElementById("select-nami").value;
  const scenario = document.getElementById("select-scenario").value;
  if (!nami || !scenario) return;

  isRunning = true;
  document.getElementById("btn-play").disabled = true;
  document.getElementById("btn-stop").disabled = false;
  document.getElementById("messages").innerHTML = "";
  document.getElementById("result-bar").style.display = "none";
  document.getElementById("status-bar").innerHTML =
    '<span class="loading-dot"></span>Iniciando conversa...';

  // Deselect history
  document.querySelectorAll(".history-item.active").forEach(el => el.classList.remove("active"));

  eventSource = new EventSource(
    `/api/conversation/stream?nami=${encodeURIComponent(nami)}&scenario=${encodeURIComponent(scenario)}`
  );

  eventSource.addEventListener("metadata", (e) => {
    const data = JSON.parse(e.data);
    currentPersona = data.persona || "Paciente";
    document.getElementById("status-bar").innerHTML =
      `<span class="loading-dot"></span>${data.test_case} — ${data.nami_model} vs ${data.patient_model}`;
  });

  eventSource.addEventListener("status", (e) => {
    const data = JSON.parse(e.data);
    document.getElementById("status-bar").innerHTML =
      `<span class="loading-dot"></span>${data.text}`;
  });

  eventSource.addEventListener("message", (e) => {
    const data = JSON.parse(e.data);
    addMessage(data.role, data.content, data.role === "patient" ? currentPersona : "Nami");
  });

  eventSource.addEventListener("error_event", (e) => {
    const data = JSON.parse(e.data);
    const statusBar = document.getElementById("status-bar");
    statusBar.innerHTML = `<span style="color:#dc3545">Erro: ${data.message}</span>`;
  });

  eventSource.addEventListener("done", (e) => {
    const data = JSON.parse(e.data);
    finishConversation(data.stop_reason, data.total_turns);
  });

  eventSource.onerror = () => {
    if (isRunning) {
      finishConversation("connection_error", 0);
    }
  };
}

function addMessage(role, content, speakerOverride) {
  const messagesEl = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `message ${role}`;

  const speaker = document.createElement("div");
  speaker.className = "speaker";
  speaker.textContent = speakerOverride || role;

  const contentEl = document.createElement("div");
  contentEl.className = "content";
  contentEl.textContent = content;

  div.appendChild(speaker);
  div.appendChild(contentEl);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function finishConversation(stopReason, totalTurns) {
  isRunning = false;
  if (eventSource) {
    eventSource.close();
    eventSource = null;
  }

  document.getElementById("btn-play").disabled = false;
  document.getElementById("btn-stop").disabled = true;

  const label = STOP_LABELS[stopReason] || stopReason;
  document.getElementById("status-bar").textContent =
    `Finalizada — ${totalTurns} turno(s)`;

  const resultBar = document.getElementById("result-bar");
  resultBar.style.display = "block";
  if (stopReason === "nami_succeeded") {
    resultBar.style.color = "#155724";
    resultBar.style.background = "#d4edda";
  } else if (stopReason === "turns_ended" || stopReason === "cancelled") {
    resultBar.style.color = "#856404";
    resultBar.style.background = "#fff3cd";
  } else {
    resultBar.style.color = "#721c24";
    resultBar.style.background = "#f8d7da";
  }
  resultBar.textContent = `Resultado: ${label}`;

  updatePlayButton();
  loadHistory();
}

async function stopConversation() {
  await fetch("/api/conversation/stop", { method: "POST" });
}

// ── History ───────────────────────────────────────────────────────────────

async function loadHistory() {
  const res = await fetch("/api/conversations");
  const conversations = await res.json();
  const list = document.getElementById("history-list");
  list.innerHTML = "";

  conversations.forEach(conv => {
    const div = document.createElement("div");
    div.className = "history-item";
    div.dataset.id = conv.id;

    const namiLabel = conv.nami_config_name || (conv.nami_model ? conv.nami_model.split("/").pop() : "");

    const stopLabel = STOP_LABELS[conv.stop_reason] || conv.stop_reason;
    let resultClass = "result-other";
    if (conv.stop_reason === "nami_succeeded") resultClass = "result-success";
    else if (conv.stop_reason && conv.stop_reason.includes("error")) resultClass = "result-error";

    div.innerHTML = `
      <div class="test-case">${conv.test_case}</div>
      <div class="meta">${namiLabel} · ${conv.total_turns} turnos</div>
      <span class="result ${resultClass}">${stopLabel}</span>
    `;

    div.addEventListener("click", () => loadConversation(conv.id, div));
    list.appendChild(div);
  });
}

async function loadConversation(id, element) {
  // Highlight
  document.querySelectorAll(".history-item.active").forEach(el => el.classList.remove("active"));
  if (element) element.classList.add("active");

  const res = await fetch(`/api/conversations/${id}`);
  const conv = await res.json();

  const messagesEl = document.getElementById("messages");
  messagesEl.innerHTML = "";

  conv.messages.forEach(msg => {
    addMessage(msg.role, msg.content, msg.role === "nami" ? "Nami" : conv.persona);
  });

  const stopLabel = STOP_LABELS[conv.conversation_stop_reason] || conv.conversation_stop_reason;
  document.getElementById("status-bar").textContent =
    `${conv.test_case} — ${conv.metadata.total_turns} turno(s)`;

  const resultBar = document.getElementById("result-bar");
  resultBar.style.display = "block";
  if (conv.conversation_stop_reason === "nami_succeeded") {
    resultBar.style.color = "#155724";
    resultBar.style.background = "#d4edda";
  } else if (conv.conversation_stop_reason === "turns_ended") {
    resultBar.style.color = "#856404";
    resultBar.style.background = "#fff3cd";
  } else {
    resultBar.style.color = "#721c24";
    resultBar.style.background = "#f8d7da";
  }
  resultBar.textContent = `Resultado: ${stopLabel}`;
}

// ── Boot ──────────────────────────────────────────────────────────────────

init();
</script>
</body>
</html>
