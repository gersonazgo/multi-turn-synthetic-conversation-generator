<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversation Playground</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100vh;
    display: flex;
    background: #f5f5f5;
    color: #333;
  }

  /* History sidebar */
  #sidebar {
    width: 220px;
    min-width: 220px;
    background: #fff;
    border-right: 1px solid #ddd;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #sidebar h2 {
    font-size: 14px;
    padding: 12px;
    border-bottom: 1px solid #eee;
    color: #666;
  }
  #history-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .history-item {
    padding: 8px 12px;
    cursor: pointer;
    border-bottom: 1px solid #f0f0f0;
    font-size: 12px;
    line-height: 1.4;
  }
  .history-item:hover { background: #f0f7ff; }
  .history-item.active { background: #e3f0ff; }
  .history-item .test-case { font-weight: 600; color: #333; }
  .history-item .meta { color: #888; font-size: 11px; }
  .history-item .result {
    display: inline-block;
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    margin-top: 2px;
  }
  .result-success { background: #d4edda; color: #155724; }
  .result-error { background: #f8d7da; color: #721c24; }
  .result-other { background: #e2e3e5; color: #383d41; }

  /* Conversation panel */
  #conversation-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: #e5ddd5;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5c1.5 0 2.7 1.2 2.7 2.7S31.5 10.4 30 10.4s-2.7-1.2-2.7-2.7S28.5 5 30 5zm15 15c1.5 0 2.7 1.2 2.7 2.7s-1.2 2.7-2.7 2.7-2.7-1.2-2.7-2.7 1.2-2.7 2.7-2.7zm-30 0c1.5 0 2.7 1.2 2.7 2.7s-1.2 2.7-2.7 2.7-2.7-1.2-2.7-2.7 1.2-2.7 2.7-2.7zm15 15c1.5 0 2.7 1.2 2.7 2.7s-1.2 2.7-2.7 2.7-2.7-1.2-2.7-2.7 1.2-2.7 2.7-2.7zm15 15c1.5 0 2.7 1.2 2.7 2.7s-1.2 2.7-2.7 2.7-2.7-1.2-2.7-2.7 1.2-2.7 2.7-2.7zm-30 0c1.5 0 2.7 1.2 2.7 2.7s-1.2 2.7-2.7 2.7-2.7-1.2-2.7-2.7 1.2-2.7 2.7-2.7z' fill='%23d4cdc4' fill-opacity='0.3'/%3E%3C/svg%3E");
  }
  #status-bar {
    padding: 8px 16px;
    background: #075e54;
    color: #fff;
    font-size: 13px;
    min-height: 40px;
    display: flex;
    align-items: center;
  }
  #status-bar .loading-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #25d366;
    margin-right: 8px;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 48px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* Chat-style bubbles */
  .message {
    max-width: 65%;
    padding: 6px 12px 6px 12px;
    border-radius: 8px;
    line-height: 1.45;
    position: relative;
    box-shadow: 0 1px 1px rgba(0,0,0,0.08);
    clear: both;
  }
  .message .speaker {
    font-weight: 600;
    font-size: 12px;
    margin-bottom: 2px;
  }
  .message .content {
    font-size: 14px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  /* User bubble — left, white */
  .message.user {
    background: #fff;
    align-self: flex-start;
    border-top-left-radius: 0;
  }
  .message.user .speaker { color: #075e54; }
  .message.user::before {
    content: "";
    position: absolute;
    top: 0;
    left: -8px;
    width: 0; height: 0;
    border-top: 0 solid transparent;
    border-bottom: 10px solid transparent;
    border-right: 8px solid #fff;
  }

  /* Assistant bubble group — right aligned */
  .message.assistant {
    background: #dcf8c6;
    align-self: flex-end;
    border-top-right-radius: 0;
  }
  .message.assistant .speaker { color: #1e8850; }
  .message.assistant::before {
    content: "";
    position: absolute;
    top: 0;
    right: -8px;
    width: 0; height: 0;
    border-top: 0 solid transparent;
    border-bottom: 10px solid transparent;
    border-left: 8px solid #dcf8c6;
  }

  /* Structured assistant output (reasoning + answer as separate blocks) */
  .message.assistant.structured {
    background: transparent;
    box-shadow: none;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .message.assistant.structured::before { display: none; }
  .message.assistant.structured .speaker { display: none; }
  .message.assistant.structured .content { display: none; }

  .bubble-reasoning {
    background: #fff8e1;
    border-left: 3px solid #f9a825;
    border-radius: 8px;
    padding: 6px 12px;
    box-shadow: 0 1px 1px rgba(0,0,0,0.08);
  }
  .bubble-reasoning .bubble-label {
    font-size: 11px;
    font-weight: 700;
    color: #f57f17;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
  }
  .bubble-reasoning .bubble-text {
    font-size: 13px;
    color: #5d4037;
    white-space: pre-wrap;
    word-wrap: break-word;
    line-height: 1.45;
    font-style: italic;
  }

  .bubble-answer {
    background: #dcf8c6;
    border-radius: 8px;
    border-top-right-radius: 0;
    padding: 6px 12px;
    box-shadow: 0 1px 1px rgba(0,0,0,0.08);
    position: relative;
  }
  .bubble-answer::before {
    content: "";
    position: absolute;
    top: 0;
    right: -8px;
    width: 0; height: 0;
    border-top: 0 solid transparent;
    border-bottom: 10px solid transparent;
    border-left: 8px solid #dcf8c6;
  }
  .bubble-answer .bubble-label {
    font-size: 11px;
    font-weight: 700;
    color: #1e8850;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
  }
  .bubble-answer .bubble-text {
    font-size: 14px;
    color: #333;
    white-space: pre-wrap;
    word-wrap: break-word;
    line-height: 1.45;
  }

  /* Emergency tool-call bubble */
  .bubble-tool-call {
    background: #f8d7da;
    border: 1px solid #dc3545;
    border-radius: 8px;
    padding: 8px 12px;
    box-shadow: 0 1px 2px rgba(220, 53, 69, 0.2);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .bubble-tool-call .tool-banner {
    font-size: 13px;
    font-weight: 600;
    color: #721c24;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .bubble-tool-call .tool-reasoning {
    font-size: 12px;
    color: #5a1a1f;
    background: rgba(255, 255, 255, 0.55);
    border-radius: 4px;
    padding: 6px 8px;
    white-space: pre-wrap;
    line-height: 1.45;
    font-style: italic;
  }
  .bubble-tool-call .tool-reasoning-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #721c24;
    margin-bottom: 3px;
    font-style: normal;
  }
  .message.tool-call-marker {
    background: transparent;
    box-shadow: none;
    padding: 0;
    max-width: 65%;
    align-self: flex-end;
  }
  .message.tool-call-marker::before { display: none; }
  .message.tool-call-marker .speaker,
  .message.tool-call-marker .content { display: none; }

  #result-bar {
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 500;
    display: none;
    text-align: center;
  }

  /* Resizer handle */
  #resizer {
    width: 5px;
    cursor: col-resize;
    background: #ddd;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  #resizer:hover, #resizer.active {
    background: #1a73e8;
  }

  /* Controls panel */
  #controls {
    width: 380px;
    min-width: 280px;
    background: #fff;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 12px;
    overflow-y: auto;
  }
  #controls label {
    font-size: 12px;
    font-weight: 600;
    color: #555;
    display: block;
    margin-bottom: 4px;
  }
  #controls select {
    width: 100%;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 13px;
    background: #fff;
  }
  .button-row {
    display: flex;
    gap: 8px;
  }
  button {
    padding: 8px 16px;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #btn-play {
    flex: 1;
    background: #1a73e8;
    color: #fff;
  }
  #btn-play:hover:not(:disabled) { background: #1557b0; }
  #btn-stop {
    flex: 1;
    background: #dc3545;
    color: #fff;
  }
  #btn-stop:hover:not(:disabled) { background: #b02a37; }
  #btn-save {
    width: 100%;
    background: #28a745;
    color: #fff;
  }
  #btn-save:hover:not(:disabled) { background: #1e7e34; }

  /* Editor */
  #editor-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  #editor {
    flex: 1;
    width: 100%;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    font-size: 12px;
    line-height: 1.5;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    resize: none;
    min-height: 200px;
    tab-size: 2;
  }
  #save-status {
    font-size: 11px;
    color: #888;
    margin-top: 4px;
    min-height: 16px;
  }

  /* View toggle */
  .view-toggle {
    display: flex;
    gap: 0;
    margin-bottom: 4px;
  }
  .view-toggle button {
    flex: 1;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid #ccc;
    background: #f5f5f5;
    color: #666;
    cursor: pointer;
    transition: all 0.15s;
  }
  .view-toggle button:first-child {
    border-radius: 4px 0 0 4px;
  }
  .view-toggle button:last-child {
    border-radius: 0 4px 4px 0;
    border-left: none;
  }
  .view-toggle button.active {
    background: #1a73e8;
    color: #fff;
    border-color: #1a73e8;
  }

  /* Structured prompt view */
  #prompt-structure {
    display: none;
    flex: 1;
    overflow-y: auto;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 8px 0;
    background: #fafafa;
    min-height: 200px;
    font-size: 13px;
  }
  .section-item {
    cursor: pointer;
    user-select: none;
  }
  .section-header {
    display: flex;
    align-items: center;
    padding: 5px 10px;
    gap: 6px;
    transition: background 0.1s;
    position: relative;
  }
  .section-header:hover {
    background: #e8f0fe;
  }
  .section-drag {
    color: #bbb;
    font-size: 12px;
    cursor: grab;
    user-select: none;
    flex-shrink: 0;
    width: 10px;
    text-align: center;
    visibility: hidden;
  }
  .section-header:hover .section-drag {
    visibility: visible;
  }
  .section-header.dragging .section-drag,
  .section-item.dragging > .section-header .section-drag {
    cursor: grabbing;
  }
  .section-item.dragging {
    opacity: 0.45;
  }
  .section-actions {
    margin-left: auto;
    display: flex;
    gap: 2px;
    visibility: hidden;
  }
  .section-header:hover .section-actions {
    visibility: visible;
  }
  .section-action {
    background: none;
    border: none;
    padding: 2px 6px;
    font-size: 12px;
    cursor: pointer;
    color: #666;
    border-radius: 3px;
    line-height: 1;
  }
  .section-action:hover {
    background: #d1e3fd;
    color: #1a73e8;
  }
  .section-action.danger:hover {
    background: #fde1e1;
    color: #dc3545;
  }
  .section-label[contenteditable="true"] {
    background: #fff;
    border: 1px solid #1a73e8;
    padding: 1px 4px;
    border-radius: 3px;
    outline: none;
    cursor: text;
  }
  .section-header.drop-before::before,
  .section-header.drop-after::after {
    content: "";
    position: absolute;
    left: 10px;
    right: 10px;
    height: 2px;
    background: #1a73e8;
    border-radius: 1px;
    pointer-events: none;
  }
  .section-header.drop-before::before {
    top: -1px;
  }
  .section-header.drop-after::after {
    bottom: -1px;
  }
  .section-arrow {
    font-size: 10px;
    color: #888;
    width: 14px;
    text-align: center;
    flex-shrink: 0;
    transition: transform 0.15s;
  }
  .section-arrow.expanded {
    transform: rotate(90deg);
  }
  .section-arrow.leaf {
    visibility: hidden;
  }
  .section-label {
    font-weight: 600;
    color: #333;
  }
  .section-level-1 {
    font-size: 14px;
  }
  .section-level-1 > .section-header .section-label {
    font-weight: 700;
    color: #222;
  }
  .section-level-2 .section-header {
    padding-left: 26px;
  }
  .section-level-2 .section-label {
    font-size: 13px;
  }
  .section-level-3 .section-header {
    padding-left: 46px;
  }
  .section-level-3 .section-label {
    font-weight: 500;
    color: #555;
    font-size: 12px;
  }
  .section-children {
    display: none;
  }
  .section-children.open {
    display: block;
  }
  .section-content {
    display: none;
    margin: 6px 0 6px 46px;
    padding: 8px 12px;
    background: #f8f9fa;
    border-left: 3px solid #1a73e8;
    border-radius: 0 6px 6px 0;
    font-size: 12px;
    color: #444;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .section-content.open {
    display: block;
  }
  .section-content[contenteditable="true"] {
    background: #fff;
    border: 1px solid #1a73e8;
    border-left: 3px solid #1a73e8;
    outline: none;
    cursor: text;
  }
  .section-content .edit-hint {
    display: block;
    margin-top: 4px;
    font-size: 10px;
    color: #999;
    font-style: italic;
  }
  .section-header.active-leaf .section-label {
    color: #1a73e8;
  }

  /* Display toggle */
  #display-toggle {
    padding: 4px 0;
  }
  .toggle-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #555;
    cursor: pointer;
    user-select: none;
  }
  .toggle-label input[type="checkbox"] {
    accent-color: #1a73e8;
    cursor: pointer;
  }

  /* Toast notification */
  #toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(40, 167, 69, 0.95);
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    padding: 20px 40px;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    z-index: 9999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
  }
  #toast.visible {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  /* Config meta info */
  #config-meta {
    display: none;
    font-size: 11px;
    color: #666;
    background: #f5f5f5;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    padding: 6px 10px;
    gap: 8px;
  }
  #config-meta span {
    font-weight: 600;
    color: #333;
  }
</style>
</head>
<body>

<!-- Sidebar: History -->
<div id="sidebar">
  <h2>History</h2>
  <div id="history-list"></div>
</div>

<!-- Conversation Panel -->
<div id="conversation-panel">
  <div id="status-bar">Select a prompt and scenario to start.</div>
  <div id="messages"></div>
  <div id="result-bar"></div>
</div>

<!-- Resizer -->
<div id="resizer"></div>

<!-- Controls -->
<div id="controls">
  <div>
    <label for="select-assistant">Assistant Prompt</label>
    <select id="select-assistant"><option value="">Loading...</option></select>
  </div>

  <div>
    <label for="select-scenario">User Scenario</label>
    <select id="select-scenario"><option value="">Loading...</option></select>
  </div>

  <div class="button-row">
    <button id="btn-play" disabled>&#9654; Play</button>
    <button id="btn-stop" disabled>&#9632; Stop</button>
  </div>

  <div id="display-toggle">
    <label class="toggle-label">
      <input type="checkbox" id="chk-raw" checked>
      <span>Show Reasoning + Answer</span>
    </label>
    <label class="toggle-label">
      <input type="checkbox" id="chk-autoscroll">
      <span>Auto-scroll</span>
    </label>
  </div>

  <div id="config-meta">
    Model: <span id="meta-model">—</span> &nbsp;|&nbsp; Temperature: <span id="meta-temp">—</span>
  </div>

  <div id="editor-container">
    <label>Prompt (Assistant)</label>
    <div class="view-toggle">
      <button id="btn-view-editor" class="active" onclick="switchView('editor')">Editor</button>
      <button id="btn-view-structure" onclick="switchView('structure')">Outline</button>
    </div>
    <textarea id="editor" placeholder="Select an assistant prompt to edit..." spellcheck="false"></textarea>
    <div id="prompt-structure"></div>
    <div id="save-status"></div>
  </div>

  <button id="btn-save" disabled>Save Prompt</button>
</div>

<div id="toast"></div>

<script>
function showToast(message, duration = 1800) {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.classList.add("visible");
  setTimeout(() => toast.classList.remove("visible"), duration);
}

function getEditorContent() {
  return document.getElementById("editor").value;
}

function setEditorContent(text) {
  document.getElementById("editor").value = text;
}

const STOP_LABELS = {
  assistant_succeeded: "Assistant succeeded",
  turns_ended: "Turn limit reached",
  cancelled: "Cancelled by user",
  llm_transient_error: "Error: transient (rate limit/timeout)",
  llm_content_error: "Error: empty/refused content",
  llm_non_transient_error: "Error: non-transient failure",
};

let eventSource = null;
let isRunning = false;
let currentAssistant = "";
let currentPersona = "";

// ── Init ──────────────────────────────────────────────────────────────────

async function init() {
  await Promise.all([loadAssistantConfigs(), loadScenarioConfigs(), loadHistory()]);
  document.getElementById("select-assistant").addEventListener("change", onAssistantSelect);
  document.getElementById("btn-play").addEventListener("click", startConversation);
  document.getElementById("btn-stop").addEventListener("click", stopConversation);
  document.getElementById("btn-save").addEventListener("click", savePrompt);
  document.getElementById("chk-raw").addEventListener("change", refreshMessages);
}

// ── Load configs ──────────────────────────────────────────────────────────

async function loadAssistantConfigs() {
  const res = await fetch("/api/configs/assistant");
  const configs = await res.json();
  const select = document.getElementById("select-assistant");
  select.innerHTML = '<option value="">-- Select --</option>';
  configs.forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    select.appendChild(opt);
  });
  updatePlayButton();
}

async function loadScenarioConfigs() {
  const res = await fetch("/api/configs/user");
  const configs = await res.json();
  const select = document.getElementById("select-scenario");
  select.innerHTML = '<option value="">-- Select --</option>';
  configs.forEach(cfg => {
    const opt = document.createElement("option");
    opt.value = cfg.name;
    opt.textContent = `${cfg.test_case} — ${cfg.scenario}`;
    select.appendChild(opt);
  });
  select.addEventListener("change", updatePlayButton);
}

// ── Load editor ───────────────────────────────────────────────────────────

async function onAssistantSelect() {
  const name = document.getElementById("select-assistant").value;
  currentAssistant = name;
  const saveStatus = document.getElementById("save-status");
  const configMeta = document.getElementById("config-meta");
  saveStatus.textContent = "";

  if (!name) {
    setEditorContent("");
    configMeta.style.display = "none";
    document.getElementById("btn-save").disabled = true;
    updatePlayButton();
    return;
  }

  const res = await fetch(`/api/configs/assistant/${name}/prompt`);
  const data = await res.json();
  setEditorContent(data.system_prompt);
  document.getElementById("meta-model").textContent = data.model;
  document.getElementById("meta-temp").textContent = data.temperature;
  configMeta.style.display = "flex";
  document.getElementById("btn-save").disabled = false;
  updatePlayButton();
}

// ── Save prompt ───────────────────────────────────────────────────────────

async function savePrompt() {
  if (!currentAssistant) return;
  const systemPrompt = getEditorContent();
  const saveStatus = document.getElementById("save-status");

  try {
    const res = await fetch(`/api/configs/assistant/${currentAssistant}/prompt`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ system_prompt: systemPrompt }),
    });
    if (!res.ok) {
      const err = await res.json();
      saveStatus.textContent = `Error: ${err.detail || "failed to save"}`;
      saveStatus.style.color = "#dc3545";
      return;
    }
    saveStatus.textContent = `Saved successfully. Backup created.`;
    saveStatus.style.color = "#28a745";
    showToast("\u2714  Prompt salvo!");
  } catch (e) {
    saveStatus.textContent = `Error: ${e.message}`;
    saveStatus.style.color = "#dc3545";
  }
}

// ── Conversation ──────────────────────────────────────────────────────────

function updatePlayButton() {
  const assistant = document.getElementById("select-assistant").value;
  const scenario = document.getElementById("select-scenario").value;
  document.getElementById("btn-play").disabled = !assistant || !scenario || isRunning;
}

function startConversation() {
  const assistant = document.getElementById("select-assistant").value;
  const scenario = document.getElementById("select-scenario").value;
  if (!assistant || !scenario) return;

  isRunning = true;
  document.getElementById("btn-play").disabled = true;
  document.getElementById("btn-stop").disabled = false;
  document.getElementById("messages").innerHTML = "";
  document.getElementById("result-bar").style.display = "none";
  document.getElementById("status-bar").innerHTML =
    '<span class="loading-dot"></span>Starting conversation...';

  // Deselect history
  document.querySelectorAll(".history-item.active").forEach(el => el.classList.remove("active"));

  eventSource = new EventSource(
    `/api/conversation/stream?assistant=${encodeURIComponent(assistant)}&scenario=${encodeURIComponent(scenario)}`
  );

  eventSource.addEventListener("metadata", (e) => {
    const data = JSON.parse(e.data);
    currentPersona = data.persona || "User";
    document.getElementById("status-bar").innerHTML =
      `<span class="loading-dot"></span>${data.test_case} — ${data.assistant_model} vs ${data.user_model}`;
  });

  eventSource.addEventListener("status", (e) => {
    const data = JSON.parse(e.data);
    document.getElementById("status-bar").innerHTML =
      `<span class="loading-dot"></span>${data.text}`;
  });

  eventSource.addEventListener("message", (e) => {
    const data = JSON.parse(e.data);
    addMessage(data.role, data.content, data.role === "user" ? currentPersona : "Assistant");
  });

  eventSource.addEventListener("tool_call", (e) => {
    const data = JSON.parse(e.data);
    addToolCallBubble(data.name, data.arguments);
  });

  eventSource.addEventListener("error_event", (e) => {
    const data = JSON.parse(e.data);
    const statusBar = document.getElementById("status-bar");
    statusBar.innerHTML = `<span style="color:#dc3545">Error: ${data.message}</span>`;
  });

  eventSource.addEventListener("done", (e) => {
    const data = JSON.parse(e.data);
    finishConversation(data.stop_reason, data.total_turns);
  });

  eventSource.onerror = () => {
    if (isRunning) {
      finishConversation("connection_error", 0);
    }
  };
}

function isRawMode() {
  return document.getElementById("chk-raw").checked;
}

function parseXmlBlocks(raw) {
  const reasoning = raw.match(/<reasoning[^>]*>\s*([\s\S]*?)\s*<\/reasoning>/);
  const answer = raw.match(/<answer>\s*([\s\S]*?)\s*<\/answer>/);
  if (!reasoning && !answer) return null;
  return {
    reasoning: reasoning ? reasoning[1].trim() : null,
    answer: answer ? answer[1].trim() : raw,
  };
}

function renderAssistantBubble(div, raw, speakerLabel) {
  // Remove previous structured bubbles
  div.querySelectorAll(".bubble-reasoning, .bubble-answer").forEach(el => el.remove());

  const parsed = parseXmlBlocks(raw);
  const showStructured = isRawMode() && parsed;

  // Reset base content visibility
  const contentEl = div.querySelector(".content");
  const speakerEl = div.querySelector(".speaker");

  if (showStructured) {
    div.classList.add("structured");

    if (parsed.reasoning) {
      const reasoningBubble = document.createElement("div");
      reasoningBubble.className = "bubble-reasoning";
      reasoningBubble.innerHTML =
        '<div class="bubble-label">Reasoning</div>' +
        '<div class="bubble-text"></div>';
      reasoningBubble.querySelector(".bubble-text").textContent = parsed.reasoning;
      div.appendChild(reasoningBubble);
    }

    const answerBubble = document.createElement("div");
    answerBubble.className = "bubble-answer";
    answerBubble.innerHTML =
      '<div class="bubble-label">Answer</div>' +
      '<div class="bubble-text"></div>';
    answerBubble.querySelector(".bubble-text").textContent = parsed.answer;
    div.appendChild(answerBubble);
  } else {
    div.classList.remove("structured");
    contentEl.textContent = parsed ? parsed.answer : raw;
  }
}

function renderToolCallBubble(bubble, args) {
  bubble.innerHTML = "";
  const banner = document.createElement("div");
  banner.className = "tool-banner";
  banner.textContent = "☎️ Contato de emergência acionado";
  bubble.appendChild(banner);

  if (isRawMode() && args && args.reasoning) {
    const reasoning = document.createElement("div");
    reasoning.className = "tool-reasoning";
    const label = document.createElement("div");
    label.className = "tool-reasoning-label";
    label.textContent = "Reasoning";
    reasoning.appendChild(label);
    const text = document.createElement("div");
    text.textContent = args.reasoning;
    reasoning.appendChild(text);
    bubble.appendChild(reasoning);
  }
}

function addToolCallBubble(name, args) {
  if (name !== "call_emergency_contact") return;
  const messagesEl = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "message tool-call-marker";
  div.dataset.toolCall = JSON.stringify({ name, arguments: args });

  const bubble = document.createElement("div");
  bubble.className = "bubble-tool-call";
  renderToolCallBubble(bubble, args);
  div.appendChild(bubble);

  messagesEl.appendChild(div);

  if (document.getElementById("chk-autoscroll").checked) {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
}

function addMessage(role, content, speakerOverride) {
  const messagesEl = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `message ${role}`;
  div.dataset.rawContent = content;
  div.dataset.role = role;
  div.dataset.speaker = speakerOverride || role;

  const speaker = document.createElement("div");
  speaker.className = "speaker";
  speaker.textContent = speakerOverride || role;

  const contentEl = document.createElement("div");
  contentEl.className = "content";

  div.appendChild(speaker);
  div.appendChild(contentEl);
  messagesEl.appendChild(div);

  if (role === "assistant") {
    renderAssistantBubble(div, content, speakerOverride);
  } else {
    contentEl.textContent = content;
  }

  if (document.getElementById("chk-autoscroll").checked) {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
}

function refreshMessages() {
  document.querySelectorAll(".message").forEach(div => {
    if (div.dataset.toolCall) {
      const parsed = JSON.parse(div.dataset.toolCall);
      const bubble = div.querySelector(".bubble-tool-call");
      if (bubble) renderToolCallBubble(bubble, parsed.arguments);
      return;
    }
    const raw = div.dataset.rawContent;
    const role = div.dataset.role;
    if (!raw) return;

    if (role === "assistant") {
      renderAssistantBubble(div, raw, div.dataset.speaker);
    }
  });
}

function finishConversation(stopReason, totalTurns) {
  isRunning = false;
  if (eventSource) {
    eventSource.close();
    eventSource = null;
  }

  document.getElementById("btn-play").disabled = false;
  document.getElementById("btn-stop").disabled = true;

  const label = STOP_LABELS[stopReason] || stopReason;
  document.getElementById("status-bar").textContent =
    `Finished — ${totalTurns} turn(s)`;

  const resultBar = document.getElementById("result-bar");
  resultBar.style.display = "block";
  if (stopReason === "assistant_succeeded") {
    resultBar.style.color = "#155724";
    resultBar.style.background = "#d4edda";
  } else if (stopReason === "turns_ended" || stopReason === "cancelled") {
    resultBar.style.color = "#856404";
    resultBar.style.background = "#fff3cd";
  } else {
    resultBar.style.color = "#721c24";
    resultBar.style.background = "#f8d7da";
  }
  resultBar.textContent = `Result: ${label}`;

  updatePlayButton();
  loadHistory();
}

async function stopConversation() {
  await fetch("/api/conversation/stop", { method: "POST" });
}

async function loadHistory() {
  const res = await fetch("/api/conversations");
  const conversations = await res.json();
  const list = document.getElementById("history-list");
  list.innerHTML = "";

  conversations.forEach(conv => {
    const div = document.createElement("div");
    div.className = "history-item";
    div.dataset.id = conv.id;

    const assistantLabel = conv.assistant_config_name || (conv.assistant_model ? conv.assistant_model.split("/").pop() : "");

    const stopLabel = STOP_LABELS[conv.stop_reason] || conv.stop_reason;
    let resultClass = "result-other";
    if (conv.stop_reason === "assistant_succeeded") resultClass = "result-success";
    else if (conv.stop_reason && conv.stop_reason.includes("error")) resultClass = "result-error";

    div.innerHTML = `
      <div class="test-case">${conv.test_case}</div>
      <div class="meta">${assistantLabel} · ${conv.total_turns} turns</div>
      <span class="result ${resultClass}">${stopLabel}</span>
    `;

    div.addEventListener("click", () => loadConversation(conv.id, div));
    list.appendChild(div);
  });
}

async function loadConversation(id, element) {
  // Highlight
  document.querySelectorAll(".history-item.active").forEach(el => el.classList.remove("active"));
  if (element) element.classList.add("active");

  const res = await fetch(`/api/conversations/${id}`);
  const conv = await res.json();

  const messagesEl = document.getElementById("messages");
  messagesEl.innerHTML = "";

  conv.messages.forEach(msg => {
    const role = msg.role === "nami" ? "assistant" : (msg.role === "patient" ? "user" : msg.role);
    addMessage(role, msg.content, role === "assistant" ? "Assistant" : conv.persona);
    if (msg.tool_calls && Array.isArray(msg.tool_calls)) {
      msg.tool_calls.forEach(tc => addToolCallBubble(tc.name, tc.arguments));
    }
  });

  const stopReason = conv.conversation_stop_reason === "nami_succeeded" ? "assistant_succeeded" : conv.conversation_stop_reason;
  const stopLabel = STOP_LABELS[stopReason] || stopReason;
  document.getElementById("status-bar").textContent =
    `${conv.test_case} — ${conv.metadata.total_turns} turn(s)`;

  const resultBar = document.getElementById("result-bar");
  resultBar.style.display = "block";
  if (stopReason === "assistant_succeeded") {
    resultBar.style.color = "#155724";
    resultBar.style.background = "#d4edda";
  } else if (stopReason === "turns_ended") {
    resultBar.style.color = "#856404";
    resultBar.style.background = "#fff3cd";
  } else {
    resultBar.style.color = "#721c24";
    resultBar.style.background = "#f8d7da";
  }
  resultBar.textContent = `Result: ${stopLabel}`;
}

// ── Outline state (set by renderStructure, mutated by DnD/rename/delete) ──
let outlineTree = [];
let outlinePreamble = [];
let dragSourcePath = null;

function getNodeByPath(tree, path) {
  let node = null;
  let nodes = tree;
  for (const idx of path) {
    node = nodes[idx];
    if (!node) return null;
    nodes = node.children || [];
  }
  return node;
}

function getSiblingsForPath(tree, path) {
  if (path.length === 1) return tree;
  const parent = getNodeByPath(tree, path.slice(0, -1));
  return parent ? parent.children : null;
}

function pathsShareParent(a, b) {
  if (a.length !== b.length) return false;
  for (let i = 0; i < a.length - 1; i++) if (a[i] !== b[i]) return false;
  return true;
}

function pathsEqual(a, b) {
  if (a.length !== b.length) return false;
  for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) return false;
  return true;
}

function serializeOutline(tree, preamble) {
  const out = [...preamble];
  function emit(nodes) {
    for (const n of nodes) {
      if (out.length > 0 && out[out.length - 1] !== "") out.push("");
      out.push("#".repeat(n.level) + " " + n.label);
      if (n.content && n.content.length > 0) out.push(...n.content);
      if (n.children && n.children.length > 0) emit(n.children);
    }
  }
  emit(tree);
  return out.join("\n");
}

function commitOutline() {
  setEditorContent(serializeOutline(outlineTree, outlinePreamble));
  const btnSave = document.getElementById("btn-save");
  btnSave.disabled = false;
  btnSave.style.display = "";
  renderStructure();
}

function renderStructure() {
  const container = document.getElementById("prompt-structure");
  const promptText = getEditorContent();
  container.innerHTML = "";

  if (!promptText.trim()) {
    container.innerHTML = '<div style="padding:10px;color:#888;">Nenhum system_prompt encontrado.</div>';
    return;
  }
  const lines = promptText.split("\n");
  const tree = [];
  const preamble = [];
  let currentNode = null;
  let seenHeader = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();
    const h3 = trimmed.match(/^###\s+(.+)/);
    const h2 = !h3 && trimmed.match(/^##\s+(.+)/);
    const h1 = !h3 && !h2 && trimmed.match(/^#\s+(.+)/);

    if (!seenHeader && !h1 && !h2 && !h3) {
      preamble.push(line);
      continue;
    }

    if (h1) {
      seenHeader = true;
      const node = { level: 1, label: h1[1].replace(/\s*#\s*$/, "").trim(), children: [], content: [] };
      tree.push(node);
      currentNode = node;
    } else if (h2) {
      seenHeader = true;
      const label = h2[1].replace(/\s*##\s*$/, "").trim();
      const node = { level: 2, label, children: [], content: [] };
      if (tree.length > 0) tree[tree.length - 1].children.push(node);
      else tree.push(node);
      currentNode = node;
    } else if (h3) {
      seenHeader = true;
      const label = h3[1].replace(/\s*###\s*$/, "").trim();
      const node = { level: 3, label, children: [], content: [] };
      let parent = null;
      if (tree.length > 0) {
        const lastTop = tree[tree.length - 1];
        parent = lastTop.children.length > 0 ? lastTop.children[lastTop.children.length - 1] : lastTop;
      }
      if (parent) {
        if (!parent.children) parent.children = [];
        parent.children.push(node);
      }
      currentNode = node;
    } else if (currentNode) {
      currentNode.content.push(line);
    }
  }

  function trimContent(nodes) {
    for (const n of nodes) {
      while (n.content.length > 0 && n.content[n.content.length - 1].trim() === "") n.content.pop();
      while (n.content.length > 0 && n.content[0].trim() === "") n.content.shift();
      if (n.children) trimContent(n.children);
    }
  }
  trimContent(tree);
  while (preamble.length > 0 && preamble[preamble.length - 1].trim() === "") preamble.pop();

  outlineTree = tree;
  outlinePreamble = preamble;

  if (tree.length === 0) {
    container.innerHTML = '<div style="padding:10px;color:#888;">Nenhum header markdown encontrado.</div>';
    return;
  }

  function startRename(node, labelEl, itemEl) {
    if (labelEl.contentEditable === "true") return;
    itemEl.draggable = false;
    labelEl.contentEditable = "true";
    labelEl.focus();
    const range = document.createRange();
    range.selectNodeContents(labelEl);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);

    let cancelled = false;
    const finish = () => {
      if (labelEl.contentEditable !== "true") return;
      labelEl.contentEditable = "false";
      itemEl.draggable = true;
      if (cancelled) { labelEl.textContent = node.label; return; }
      const newLabel = labelEl.textContent.replace(/\s+/g, " ").trim();
      if (!newLabel || newLabel === node.label) { labelEl.textContent = node.label; return; }
      node.label = newLabel;
      commitOutline();
    };

    labelEl.addEventListener("blur", finish, { once: true });
    labelEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); labelEl.blur(); }
      else if (e.key === "Escape") { e.preventDefault(); cancelled = true; labelEl.blur(); }
    });
  }

  function deleteNode(path) {
    const node = getNodeByPath(outlineTree, path);
    if (!node) return;
    if (!confirm("Excluir \"" + node.label + "\" e todo o conteúdo dessa seção?")) return;
    const siblings = getSiblingsForPath(outlineTree, path);
    siblings.splice(path[path.length - 1], 1);
    commitOutline();
  }

  function clearDropIndicators() {
    container.querySelectorAll(".drop-before, .drop-after").forEach(el => {
      el.classList.remove("drop-before", "drop-after");
    });
  }

  function buildNode(node, levelClass, path) {
    const item = document.createElement("div");
    item.className = "section-item " + levelClass;
    item.dataset.path = JSON.stringify(path);
    item.draggable = true;

    const hasChildren = node.children && node.children.length > 0;

    const header = document.createElement("div");
    header.className = "section-header";

    const dragHandle = document.createElement("span");
    dragHandle.className = "section-drag";
    dragHandle.textContent = "⋮⋮";
    dragHandle.title = "Arraste para reordenar";

    const isLeafWithContent = !hasChildren && node.content && node.content.length > 0;
    const arrow = document.createElement("span");
    arrow.className = "section-arrow" + (hasChildren || isLeafWithContent ? "" : " leaf");
    arrow.textContent = "▶";

    const label = document.createElement("span");
    label.className = "section-label";
    label.textContent = node.label;

    const actions = document.createElement("span");
    actions.className = "section-actions";

    const renameBtn = document.createElement("button");
    renameBtn.className = "section-action";
    renameBtn.type = "button";
    renameBtn.textContent = "✎";
    renameBtn.title = "Renomear";
    renameBtn.addEventListener("click", (e) => { e.stopPropagation(); startRename(node, label, item); });
    renameBtn.addEventListener("mousedown", (e) => e.stopPropagation());

    const deleteBtn = document.createElement("button");
    deleteBtn.className = "section-action danger";
    deleteBtn.type = "button";
    deleteBtn.textContent = "✕";
    deleteBtn.title = "Excluir";
    deleteBtn.addEventListener("click", (e) => { e.stopPropagation(); deleteNode(path); });
    deleteBtn.addEventListener("mousedown", (e) => e.stopPropagation());

    actions.appendChild(renameBtn);
    actions.appendChild(deleteBtn);

    header.appendChild(dragHandle);
    header.appendChild(arrow);
    header.appendChild(label);
    header.appendChild(actions);
    item.appendChild(header);

    item.addEventListener("dragstart", (e) => {
      if (label.contentEditable === "true") { e.preventDefault(); return; }
      e.stopPropagation();
      dragSourcePath = path;
      item.classList.add("dragging");
      try {
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", JSON.stringify(path));
      } catch (_) {}
    });
    item.addEventListener("dragend", (e) => {
      e.stopPropagation();
      item.classList.remove("dragging");
      clearDropIndicators();
      dragSourcePath = null;
    });
    item.addEventListener("dragover", (e) => {
      if (!dragSourcePath) return;
      if (!pathsShareParent(dragSourcePath, path)) return;
      if (pathsEqual(dragSourcePath, path)) return;
      e.preventDefault();
      e.stopPropagation();
      e.dataTransfer.dropEffect = "move";
      const rect = header.getBoundingClientRect();
      const before = e.clientY < rect.top + rect.height / 2;
      clearDropIndicators();
      header.classList.add(before ? "drop-before" : "drop-after");
    });
    item.addEventListener("dragleave", (e) => {
      if (!item.contains(e.relatedTarget)) header.classList.remove("drop-before", "drop-after");
    });
    item.addEventListener("drop", (e) => {
      if (!dragSourcePath) return;
      if (!pathsShareParent(dragSourcePath, path)) return;
      if (pathsEqual(dragSourcePath, path)) return;
      e.preventDefault();
      e.stopPropagation();
      const rect = header.getBoundingClientRect();
      const insertAfter = e.clientY >= rect.top + rect.height / 2;
      const siblings = getSiblingsForPath(outlineTree, path);
      const sourceIdx = dragSourcePath[dragSourcePath.length - 1];
      const targetIdx = path[path.length - 1];
      const [moved] = siblings.splice(sourceIdx, 1);
      let newIdx = targetIdx;
      if (sourceIdx < targetIdx) newIdx -= 1;
      if (insertAfter) newIdx += 1;
      siblings.splice(newIdx, 0, moved);
      clearDropIndicators();
      commitOutline();
    });

    if (hasChildren) {
      const childrenContainer = document.createElement("div");
      childrenContainer.className = "section-children";

      const childLevelMap = { "section-level-1": "section-level-2", "section-level-2": "section-level-3" };
      const childLevel = childLevelMap[levelClass] || "section-level-3";

      node.children.forEach((child, i) => {
        childrenContainer.appendChild(buildNode(child, childLevel, [...path, i]));
      });

      item.appendChild(childrenContainer);

      header.addEventListener("click", (e) => {
        if (e.target.closest(".section-action")) return;
        if (label.contentEditable === "true") return;
        const isOpen = childrenContainer.classList.toggle("open");
        arrow.classList.toggle("expanded", isOpen);
      });
    } else if (node.content && node.content.length > 0) {
      const contentDiv = document.createElement("div");
      contentDiv.className = "section-content";
      contentDiv.textContent = node.content.join("\n");
      item.appendChild(contentDiv);

      header.style.cursor = "pointer";
      header.addEventListener("click", (e) => {
        if (e.target.closest(".section-action")) return;
        if (label.contentEditable === "true") return;
        const isOpen = contentDiv.classList.toggle("open");
        header.classList.toggle("active-leaf", isOpen);
        arrow.classList.toggle("expanded", isOpen);
      });

      contentDiv.addEventListener("dblclick", () => {
        if (contentDiv.contentEditable === "true") return;
        contentDiv.contentEditable = "true";
        item.draggable = false;
        contentDiv.focus();
        const sel = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(contentDiv);
        sel.removeAllRanges();
        sel.addRange(range);
      });

      contentDiv.addEventListener("blur", () => {
        if (contentDiv.contentEditable !== "true") return;
        contentDiv.contentEditable = "false";
        item.draggable = true;
        node.content = contentDiv.innerText.split("\n");
        commitOutline();
      });

      contentDiv.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          contentDiv.contentEditable = "false";
          item.draggable = true;
          contentDiv.textContent = node.content.join("\n");
        }
      });
    }

    return item;
  }

  tree.forEach((section, i) => {
    const levelClass = section.level === 1 ? "section-level-1" : "section-level-2";
    container.appendChild(buildNode(section, levelClass, [i]));
  });
}

// ── Resizer ──────────────────────────────────────────────────────────────

(function initResizer() {
  const resizer = document.getElementById("resizer");
  const controls = document.getElementById("controls");
  let startX, startWidth;

  resizer.addEventListener("mousedown", (e) => {
    startX = e.clientX;
    startWidth = controls.offsetWidth;
    resizer.classList.add("active");
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";

    function onMouseMove(e) {
      const delta = startX - e.clientX;
      const newWidth = Math.max(280, Math.min(800, startWidth + delta));
      controls.style.width = newWidth + "px";
    }

    function onMouseUp() {
      resizer.classList.remove("active");
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
      document.removeEventListener("mousemove", onMouseMove);
      document.removeEventListener("mouseup", onMouseUp);
    }

    document.addEventListener("mousemove", onMouseMove);
    document.addEventListener("mouseup", onMouseUp);
  });
})();

// ── Boot ──────────────────────────────────────────────────────────────────

init();
</script>
</body>
</html>
