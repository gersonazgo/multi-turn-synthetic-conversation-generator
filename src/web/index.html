<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversation Playground</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100vh;
    display: flex;
    background: #f5f5f5;
    color: #333;
  }

  /* History sidebar */
  #sidebar {
    width: 220px;
    min-width: 220px;
    background: #fff;
    border-right: 1px solid #ddd;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #sidebar h2 {
    font-size: 14px;
    padding: 12px;
    border-bottom: 1px solid #eee;
    color: #666;
  }
  #history-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .history-item {
    padding: 8px 12px;
    cursor: pointer;
    border-bottom: 1px solid #f0f0f0;
    font-size: 12px;
    line-height: 1.4;
  }
  .history-item:hover { background: #f0f7ff; }
  .history-item.active { background: #e3f0ff; }
  .history-item .test-case { font-weight: 600; color: #333; }
  .history-item .meta { color: #888; font-size: 11px; }
  .history-item .result {
    display: inline-block;
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    margin-top: 2px;
  }
  .result-success { background: #d4edda; color: #155724; }
  .result-error { background: #f8d7da; color: #721c24; }
  .result-other { background: #e2e3e5; color: #383d41; }

  /* Conversation panel */
  #conversation-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: #e5ddd5;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5c1.5 0 2.7 1.2 2.7 2.7S31.5 10.4 30 10.4s-2.7-1.2-2.7-2.7S28.5 5 30 5zm15 15c1.5 0 2.7 1.2 2.7 2.7s-1.2 2.7-2.7 2.7-2.7-1.2-2.7-2.7 1.2-2.7 2.7-2.7zm-30 0c1.5 0 2.7 1.2 2.7 2.7s-1.2 2.7-2.7 2.7-2.7-1.2-2.7-2.7 1.2-2.7 2.7-2.7zm15 15c1.5 0 2.7 1.2 2.7 2.7s-1.2 2.7-2.7 2.7-2.7-1.2-2.7-2.7 1.2-2.7 2.7-2.7zm15 15c1.5 0 2.7 1.2 2.7 2.7s-1.2 2.7-2.7 2.7-2.7-1.2-2.7-2.7 1.2-2.7 2.7-2.7zm-30 0c1.5 0 2.7 1.2 2.7 2.7s-1.2 2.7-2.7 2.7-2.7-1.2-2.7-2.7 1.2-2.7 2.7-2.7z' fill='%23d4cdc4' fill-opacity='0.3'/%3E%3C/svg%3E");
  }
  #status-bar {
    padding: 8px 16px;
    background: #075e54;
    color: #fff;
    font-size: 13px;
    min-height: 40px;
    display: flex;
    align-items: center;
  }
  #status-bar .loading-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #25d366;
    margin-right: 8px;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 48px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* Chat-style bubbles */
  .message {
    max-width: 65%;
    padding: 6px 12px 6px 12px;
    border-radius: 8px;
    line-height: 1.45;
    position: relative;
    box-shadow: 0 1px 1px rgba(0,0,0,0.08);
    clear: both;
  }
  .message .speaker {
    font-weight: 600;
    font-size: 12px;
    margin-bottom: 2px;
  }
  .message .content {
    font-size: 14px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  /* User bubble — left, white */
  .message.user {
    background: #fff;
    align-self: flex-start;
    border-top-left-radius: 0;
  }
  .message.user .speaker { color: #075e54; }
  .message.user::before {
    content: "";
    position: absolute;
    top: 0;
    left: -8px;
    width: 0; height: 0;
    border-top: 0 solid transparent;
    border-bottom: 10px solid transparent;
    border-right: 8px solid #fff;
  }

  /* Assistant bubble — right, green */
  .message.assistant {
    background: #dcf8c6;
    align-self: flex-end;
    border-top-right-radius: 0;
  }
  .message.assistant .speaker { color: #1e8850; }
  .message.assistant::before {
    content: "";
    position: absolute;
    top: 0;
    right: -8px;
    width: 0; height: 0;
    border-top: 0 solid transparent;
    border-bottom: 10px solid transparent;
    border-left: 8px solid #dcf8c6;
  }

  #result-bar {
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 500;
    display: none;
    text-align: center;
  }

  /* Resizer handle */
  #resizer {
    width: 5px;
    cursor: col-resize;
    background: #ddd;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  #resizer:hover, #resizer.active {
    background: #1a73e8;
  }

  /* Controls panel */
  #controls {
    width: 380px;
    min-width: 280px;
    background: #fff;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 12px;
    overflow-y: auto;
  }
  #controls label {
    font-size: 12px;
    font-weight: 600;
    color: #555;
    display: block;
    margin-bottom: 4px;
  }
  #controls select {
    width: 100%;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 13px;
    background: #fff;
  }
  .button-row {
    display: flex;
    gap: 8px;
  }
  button {
    padding: 8px 16px;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #btn-play {
    flex: 1;
    background: #1a73e8;
    color: #fff;
  }
  #btn-play:hover:not(:disabled) { background: #1557b0; }
  #btn-stop {
    flex: 1;
    background: #dc3545;
    color: #fff;
  }
  #btn-stop:hover:not(:disabled) { background: #b02a37; }
  #btn-save {
    width: 100%;
    background: #28a745;
    color: #fff;
  }
  #btn-save:hover:not(:disabled) { background: #1e7e34; }

  /* Editor */
  #editor-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  #editor {
    flex: 1;
    width: 100%;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    font-size: 12px;
    line-height: 1.5;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    resize: none;
    min-height: 200px;
    tab-size: 2;
  }
  #save-status {
    font-size: 11px;
    color: #888;
    margin-top: 4px;
    min-height: 16px;
  }

  /* View toggle */
  .view-toggle {
    display: flex;
    gap: 0;
    margin-bottom: 4px;
  }
  .view-toggle button {
    flex: 1;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid #ccc;
    background: #f5f5f5;
    color: #666;
    cursor: pointer;
    transition: all 0.15s;
  }
  .view-toggle button:first-child {
    border-radius: 4px 0 0 4px;
  }
  .view-toggle button:last-child {
    border-radius: 0 4px 4px 0;
    border-left: none;
  }
  .view-toggle button.active {
    background: #1a73e8;
    color: #fff;
    border-color: #1a73e8;
  }

  /* Structured prompt view */
  #prompt-structure {
    display: none;
    flex: 1;
    overflow-y: auto;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 8px 0;
    background: #fafafa;
    min-height: 200px;
    font-size: 13px;
  }
  .section-item {
    cursor: pointer;
    user-select: none;
  }
  .section-header {
    display: flex;
    align-items: center;
    padding: 5px 10px;
    gap: 6px;
    transition: background 0.1s;
  }
  .section-header:hover {
    background: #e8f0fe;
  }
  .section-arrow {
    font-size: 10px;
    color: #888;
    width: 14px;
    text-align: center;
    flex-shrink: 0;
    transition: transform 0.15s;
  }
  .section-arrow.expanded {
    transform: rotate(90deg);
  }
  .section-arrow.leaf {
    visibility: hidden;
  }
  .section-label {
    font-weight: 600;
    color: #333;
  }
  .section-level-1 {
    font-size: 14px;
  }
  .section-level-1 > .section-header .section-label {
    font-weight: 700;
    color: #222;
  }
  .section-level-2 .section-header {
    padding-left: 26px;
  }
  .section-level-2 .section-label {
    font-size: 13px;
  }
  .section-level-3 .section-header {
    padding-left: 46px;
  }
  .section-level-3 .section-label {
    font-weight: 500;
    color: #555;
    font-size: 12px;
  }
  .section-children {
    display: none;
  }
  .section-children.open {
    display: block;
  }

  /* Config meta info */
  #config-meta {
    display: none;
    font-size: 11px;
    color: #666;
    background: #f5f5f5;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    padding: 6px 10px;
    gap: 8px;
  }
  #config-meta span {
    font-weight: 600;
    color: #333;
  }
</style>
</head>
<body>

<!-- Sidebar: History -->
<div id="sidebar">
  <h2>History</h2>
  <div id="history-list"></div>
</div>

<!-- Conversation Panel -->
<div id="conversation-panel">
  <div id="status-bar">Select a prompt and scenario to start.</div>
  <div id="messages"></div>
  <div id="result-bar"></div>
</div>

<!-- Resizer -->
<div id="resizer"></div>

<!-- Controls -->
<div id="controls">
  <div>
    <label for="select-assistant">Assistant Prompt</label>
    <select id="select-assistant"><option value="">Loading...</option></select>
  </div>

  <div>
    <label for="select-scenario">User Scenario</label>
    <select id="select-scenario"><option value="">Loading...</option></select>
  </div>

  <div class="button-row">
    <button id="btn-play" disabled>&#9654; Play</button>
    <button id="btn-stop" disabled>&#9632; Stop</button>
  </div>

  <div id="config-meta">
    Model: <span id="meta-model">—</span> &nbsp;|&nbsp; Temperature: <span id="meta-temp">—</span>
  </div>

  <div id="editor-container">
    <label>Prompt (Assistant)</label>
    <div class="view-toggle">
      <button id="btn-view-editor" class="active" onclick="switchView('editor')">Editor</button>
      <button id="btn-view-structure" onclick="switchView('structure')">Outline</button>
    </div>
    <textarea id="editor" placeholder="Select an assistant prompt to edit..." spellcheck="false"></textarea>
    <div id="prompt-structure"></div>
    <div id="save-status"></div>
  </div>

  <button id="btn-save" disabled>Save Prompt</button>
</div>

<script>
const STOP_LABELS = {
  assistant_succeeded: "Assistant succeeded",
  turns_ended: "Turn limit reached",
  cancelled: "Cancelled by user",
  llm_transient_error: "Error: transient (rate limit/timeout)",
  llm_content_error: "Error: empty/refused content",
  llm_non_transient_error: "Error: non-transient failure",
};

let eventSource = null;
let isRunning = false;
let currentAssistant = "";
let currentPersona = "";

// ── Init ──────────────────────────────────────────────────────────────────

async function init() {
  await Promise.all([loadAssistantConfigs(), loadScenarioConfigs(), loadHistory()]);
  document.getElementById("select-assistant").addEventListener("change", onAssistantSelect);
  document.getElementById("btn-play").addEventListener("click", startConversation);
  document.getElementById("btn-stop").addEventListener("click", stopConversation);
  document.getElementById("btn-save").addEventListener("click", savePrompt);
}

// ── Load configs ──────────────────────────────────────────────────────────

async function loadAssistantConfigs() {
  const res = await fetch("/api/configs/assistant");
  const configs = await res.json();
  const select = document.getElementById("select-assistant");
  select.innerHTML = '<option value="">-- Select --</option>';
  configs.forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    select.appendChild(opt);
  });
  updatePlayButton();
}

async function loadScenarioConfigs() {
  const res = await fetch("/api/configs/user");
  const configs = await res.json();
  const select = document.getElementById("select-scenario");
  select.innerHTML = '<option value="">-- Select --</option>';
  configs.forEach(cfg => {
    const opt = document.createElement("option");
    opt.value = cfg.name;
    opt.textContent = `${cfg.test_case} — ${cfg.scenario}`;
    select.appendChild(opt);
  });
  select.addEventListener("change", updatePlayButton);
}

// ── Load editor ───────────────────────────────────────────────────────────

async function onAssistantSelect() {
  const name = document.getElementById("select-assistant").value;
  currentAssistant = name;
  const editor = document.getElementById("editor");
  const saveStatus = document.getElementById("save-status");
  const configMeta = document.getElementById("config-meta");
  saveStatus.textContent = "";

  if (!name) {
    editor.value = "";
    configMeta.style.display = "none";
    document.getElementById("btn-save").disabled = true;
    updatePlayButton();
    return;
  }

  const res = await fetch(`/api/configs/assistant/${name}/prompt`);
  const data = await res.json();
  editor.value = data.system_prompt;
  document.getElementById("meta-model").textContent = data.model;
  document.getElementById("meta-temp").textContent = data.temperature;
  configMeta.style.display = "flex";
  document.getElementById("btn-save").disabled = false;
  updatePlayButton();
}

// ── Save prompt ───────────────────────────────────────────────────────────

async function savePrompt() {
  if (!currentAssistant) return;
  const systemPrompt = document.getElementById("editor").value;
  const saveStatus = document.getElementById("save-status");

  try {
    const res = await fetch(`/api/configs/assistant/${currentAssistant}/prompt`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ system_prompt: systemPrompt }),
    });
    if (!res.ok) {
      const err = await res.json();
      saveStatus.textContent = `Error: ${err.detail || "failed to save"}`;
      saveStatus.style.color = "#dc3545";
      return;
    }
    saveStatus.textContent = `Saved successfully. Backup created.`;
    saveStatus.style.color = "#28a745";
  } catch (e) {
    saveStatus.textContent = `Error: ${e.message}`;
    saveStatus.style.color = "#dc3545";
  }
}

// ── Conversation ──────────────────────────────────────────────────────────

function updatePlayButton() {
  const assistant = document.getElementById("select-assistant").value;
  const scenario = document.getElementById("select-scenario").value;
  document.getElementById("btn-play").disabled = !assistant || !scenario || isRunning;
}

function startConversation() {
  const assistant = document.getElementById("select-assistant").value;
  const scenario = document.getElementById("select-scenario").value;
  if (!assistant || !scenario) return;

  isRunning = true;
  document.getElementById("btn-play").disabled = true;
  document.getElementById("btn-stop").disabled = false;
  document.getElementById("messages").innerHTML = "";
  document.getElementById("result-bar").style.display = "none";
  document.getElementById("status-bar").innerHTML =
    '<span class="loading-dot"></span>Starting conversation...';

  // Deselect history
  document.querySelectorAll(".history-item.active").forEach(el => el.classList.remove("active"));

  eventSource = new EventSource(
    `/api/conversation/stream?assistant=${encodeURIComponent(assistant)}&scenario=${encodeURIComponent(scenario)}`
  );

  eventSource.addEventListener("metadata", (e) => {
    const data = JSON.parse(e.data);
    currentPersona = data.persona || "User";
    document.getElementById("status-bar").innerHTML =
      `<span class="loading-dot"></span>${data.test_case} — ${data.assistant_model} vs ${data.user_model}`;
  });

  eventSource.addEventListener("status", (e) => {
    const data = JSON.parse(e.data);
    document.getElementById("status-bar").innerHTML =
      `<span class="loading-dot"></span>${data.text}`;
  });

  eventSource.addEventListener("message", (e) => {
    const data = JSON.parse(e.data);
    addMessage(data.role, data.content, data.role === "user" ? currentPersona : "Assistant");
  });

  eventSource.addEventListener("error_event", (e) => {
    const data = JSON.parse(e.data);
    const statusBar = document.getElementById("status-bar");
    statusBar.innerHTML = `<span style="color:#dc3545">Error: ${data.message}</span>`;
  });

  eventSource.addEventListener("done", (e) => {
    const data = JSON.parse(e.data);
    finishConversation(data.stop_reason, data.total_turns);
  });

  eventSource.onerror = () => {
    if (isRunning) {
      finishConversation("connection_error", 0);
    }
  };
}

function addMessage(role, content, speakerOverride) {
  const messagesEl = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `message ${role}`;

  const speaker = document.createElement("div");
  speaker.className = "speaker";
  speaker.textContent = speakerOverride || role;

  const contentEl = document.createElement("div");
  contentEl.className = "content";
  contentEl.textContent = content;

  div.appendChild(speaker);
  div.appendChild(contentEl);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function finishConversation(stopReason, totalTurns) {
  isRunning = false;
  if (eventSource) {
    eventSource.close();
    eventSource = null;
  }

  document.getElementById("btn-play").disabled = false;
  document.getElementById("btn-stop").disabled = true;

  const label = STOP_LABELS[stopReason] || stopReason;
  document.getElementById("status-bar").textContent =
    `Finished — ${totalTurns} turn(s)`;

  const resultBar = document.getElementById("result-bar");
  resultBar.style.display = "block";
  if (stopReason === "assistant_succeeded") {
    resultBar.style.color = "#155724";
    resultBar.style.background = "#d4edda";
  } else if (stopReason === "turns_ended" || stopReason === "cancelled") {
    resultBar.style.color = "#856404";
    resultBar.style.background = "#fff3cd";
  } else {
    resultBar.style.color = "#721c24";
    resultBar.style.background = "#f8d7da";
  }
  resultBar.textContent = `Result: ${label}`;

  updatePlayButton();
  loadHistory();
}

async function stopConversation() {
  await fetch("/api/conversation/stop", { method: "POST" });
}

// ── History ───────────────────────────────────────────────────────────────

async function loadHistory() {
  const res = await fetch("/api/conversations");
  const conversations = await res.json();
  const list = document.getElementById("history-list");
  list.innerHTML = "";

  conversations.forEach(conv => {
    const div = document.createElement("div");
    div.className = "history-item";
    div.dataset.id = conv.id;

    const assistantLabel = conv.assistant_config_name || (conv.assistant_model ? conv.assistant_model.split("/").pop() : "");

    const stopLabel = STOP_LABELS[conv.stop_reason] || conv.stop_reason;
    let resultClass = "result-other";
    if (conv.stop_reason === "assistant_succeeded") resultClass = "result-success";
    else if (conv.stop_reason && conv.stop_reason.includes("error")) resultClass = "result-error";

    div.innerHTML = `
      <div class="test-case">${conv.test_case}</div>
      <div class="meta">${assistantLabel} · ${conv.total_turns} turns</div>
      <span class="result ${resultClass}">${stopLabel}</span>
    `;

    div.addEventListener("click", () => loadConversation(conv.id, div));
    list.appendChild(div);
  });
}

async function loadConversation(id, element) {
  // Highlight
  document.querySelectorAll(".history-item.active").forEach(el => el.classList.remove("active"));
  if (element) element.classList.add("active");

  const res = await fetch(`/api/conversations/${id}`);
  const conv = await res.json();

  const messagesEl = document.getElementById("messages");
  messagesEl.innerHTML = "";

  conv.messages.forEach(msg => {
    const role = msg.role === "nami" ? "assistant" : (msg.role === "patient" ? "user" : msg.role);
    addMessage(role, msg.content, role === "assistant" ? "Assistant" : conv.persona);
  });

  const stopReason = conv.conversation_stop_reason === "nami_succeeded" ? "assistant_succeeded" : conv.conversation_stop_reason;
  const stopLabel = STOP_LABELS[stopReason] || stopReason;
  document.getElementById("status-bar").textContent =
    `${conv.test_case} — ${conv.metadata.total_turns} turn(s)`;

  const resultBar = document.getElementById("result-bar");
  resultBar.style.display = "block";
  if (stopReason === "assistant_succeeded") {
    resultBar.style.color = "#155724";
    resultBar.style.background = "#d4edda";
  } else if (stopReason === "turns_ended") {
    resultBar.style.color = "#856404";
    resultBar.style.background = "#fff3cd";
  } else {
    resultBar.style.color = "#721c24";
    resultBar.style.background = "#f8d7da";
  }
  resultBar.textContent = `Result: ${stopLabel}`;
}

// ── View toggle ──────────────────────────────────────────────────────────

let currentView = "editor";

function switchView(view) {
  currentView = view;
  const editor = document.getElementById("editor");
  const structure = document.getElementById("prompt-structure");
  const btnEditor = document.getElementById("btn-view-editor");
  const btnStructure = document.getElementById("btn-view-structure");
  const btnSave = document.getElementById("btn-save");

  if (view === "editor") {
    editor.style.display = "";
    structure.style.display = "none";
    btnEditor.classList.add("active");
    btnStructure.classList.remove("active");
    btnSave.style.display = "";
  } else {
    editor.style.display = "none";
    structure.style.display = "block";
    btnEditor.classList.remove("active");
    btnStructure.classList.add("active");
    btnSave.style.display = "none";
    renderStructure();
  }
}

function renderStructure() {
  const container = document.getElementById("prompt-structure");
  const promptText = document.getElementById("editor").value;
  container.innerHTML = "";

  if (!promptText.trim()) {
    container.innerHTML = '<div style="padding:10px;color:#888;">Nenhum system_prompt encontrado.</div>';
    return;
  }
  const lines = promptText.split("\n");
  // Build 3-level tree: # → ## → ###
  const tree = []; // level-1 items

  for (const line of lines) {
    const trimmed = line.trim();
    // Order matters: check ### before ## before #
    const h3 = trimmed.match(/^###\s+(.+)/);
    const h2 = !h3 && trimmed.match(/^##\s+(.+)/);
    const h1 = !h3 && !h2 && trimmed.match(/^#\s+(.+)/);

    if (h1) {
      tree.push({ level: 1, label: h1[1].replace(/\s*#\s*$/, "").trim(), children: [] });
    } else if (h2) {
      const label = h2[1].replace(/\s*##\s*$/, "").trim();
      if (tree.length > 0) {
        tree[tree.length - 1].children.push({ level: 2, label, children: [] });
      } else {
        // h2 without a parent h1 — promote to top level
        tree.push({ level: 2, label, children: [] });
      }
    } else if (h3) {
      const label = h3[1].replace(/\s*###\s*$/, "").trim();
      // Find nearest h2 parent, or nearest h1
      let parent = null;
      if (tree.length > 0) {
        const lastTop = tree[tree.length - 1];
        if (lastTop.children.length > 0) {
          parent = lastTop.children[lastTop.children.length - 1];
        } else {
          parent = lastTop;
        }
      }
      if (parent) {
        if (!parent.children) parent.children = [];
        parent.children.push({ level: 3, label });
      }
    }
  }

  if (tree.length === 0) {
    container.innerHTML = '<div style="padding:10px;color:#888;">Nenhum header markdown encontrado.</div>';
    return;
  }

  function buildNode(node, levelClass) {
    const item = document.createElement("div");
    item.className = "section-item " + levelClass;

    const hasChildren = node.children && node.children.length > 0;

    const header = document.createElement("div");
    header.className = "section-header";

    const arrow = document.createElement("span");
    arrow.className = "section-arrow" + (hasChildren ? "" : " leaf");
    arrow.textContent = "\u25B6";

    const label = document.createElement("span");
    label.className = "section-label";
    label.textContent = node.label;

    header.appendChild(arrow);
    header.appendChild(label);
    item.appendChild(header);

    if (hasChildren) {
      const childrenContainer = document.createElement("div");
      childrenContainer.className = "section-children";

      const childLevelMap = { "section-level-1": "section-level-2", "section-level-2": "section-level-3" };
      const childLevel = childLevelMap[levelClass] || "section-level-3";

      node.children.forEach(child => {
        childrenContainer.appendChild(buildNode(child, childLevel));
      });

      item.appendChild(childrenContainer);

      header.addEventListener("click", () => {
        const isOpen = childrenContainer.classList.toggle("open");
        arrow.classList.toggle("expanded", isOpen);
      });
    }

    return item;
  }

  tree.forEach(section => {
    const levelClass = section.level === 1 ? "section-level-1" : "section-level-2";
    container.appendChild(buildNode(section, levelClass));
  });
}

// ── Resizer ──────────────────────────────────────────────────────────────

(function initResizer() {
  const resizer = document.getElementById("resizer");
  const controls = document.getElementById("controls");
  let startX, startWidth;

  resizer.addEventListener("mousedown", (e) => {
    startX = e.clientX;
    startWidth = controls.offsetWidth;
    resizer.classList.add("active");
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";

    function onMouseMove(e) {
      const delta = startX - e.clientX;
      const newWidth = Math.max(280, Math.min(800, startWidth + delta));
      controls.style.width = newWidth + "px";
    }

    function onMouseUp() {
      resizer.classList.remove("active");
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
      document.removeEventListener("mousemove", onMouseMove);
      document.removeEventListener("mouseup", onMouseUp);
    }

    document.addEventListener("mousemove", onMouseMove);
    document.addEventListener("mouseup", onMouseUp);
  });
})();

// ── Boot ──────────────────────────────────────────────────────────────────

init();
</script>
</body>
